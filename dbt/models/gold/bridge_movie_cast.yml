models:
  - name: bridge_movie_cast
    description: Bridge table resolving the N:N relationship between movies and cast members. One row per movie-person association.
    columns:
      - name: MOVIE_ID
        description: Foreign key referencing the movie in dim_movie.
        data_type: number
        tests:
          - not_null
      - name: PERSON_ID
        description: Foreign key referencing the person in dim_person.
        data_type: number
        tests:
          - not_null
      - name: CHARACTER
        description: Character name played by this person in the movie.
        data_type: varchar
      - name: CAST_ORDER
        description: Order of appearance in the credits (lower = more prominent).
        data_type: number
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - MOVIE_ID
            - PERSON_ID
