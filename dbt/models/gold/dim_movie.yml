models:
  - name: dim_movie
    description: Movie dimension table with clean business-facing attributes. One row per movie.
    columns:
      - name: MOVIE_ID
        description: Unique identifier for the movie.
        data_type: number
        tests:
          - unique
          - not_null
      - name: TITLE
        description: The movie title.
        data_type: varchar
        tests:
          - not_null
      - name: ORIGINAL_TITLE
        description: The original movie title in its original language.
        data_type: varchar
        tests:
          - not_null
      - name: ORIGINAL_LANGUAGE
        description: The original language of the movie (ISO 639-1 code).
        data_type: varchar
        tests:
          - not_null
      - name: OVERVIEW
        description: A short plot summary of the movie.
        data_type: varchar
      - name: RELEASE_DATE
        description: The theatrical release date of the movie.
        data_type: date
        tests:
          - not_null
      - name: POPULARITY
        description: TMDB popularity score.
        data_type: float
        tests:
          - not_null
      - name: VOTE_AVERAGE
        description: Average user rating on TMDB (0-10 scale).
        data_type: float
        tests:
          - not_null
      - name: VOTE_COUNT
        description: Total number of user votes on TMDB.
        data_type: number
        tests:
          - not_null
      - name: ADULT
        description: Whether the movie is flagged as adult content.
        data_type: boolean
        tests:
          - not_null
      - name: IMDB_ID
        description: IMDb identifier for the movie (e.g. tt0137523). Null if details not yet ingested.
        data_type: varchar
      - name: TAGLINE
        description: The movie tagline. Null if not available or details not yet ingested.
        data_type: varchar
      - name: STATUS
        description: Release status (e.g. Released, In Production). Null if details not yet ingested.
        data_type: varchar
      - name: RUNTIME
        description: Movie runtime in minutes. Null if details not yet ingested.
        data_type: number
      - name: BUDGET
        description: Production budget in USD. Null if details not yet ingested.
        data_type: number
      - name: REVENUE
        description: Box office revenue in USD. Null if details not yet ingested.
        data_type: number
