models:
  - name: base_bronze_TMDB_MOVIE_CREDITS_RAW
    description: The base_bronze_TMDB_MOVIE_CREDITS_RAW model is a transformation layer that processes raw data from the TMDB_MOVIE_CREDITS_RAW table in the DB_FIND_A_MOVIE.BRONZE schema. It selects and renames specific columns, including MOVIE_ID, ENDPOINT, RAW_JSON, and INGESTED_AT, to provide a clean and structured dataset for further analysis.
    columns:
      - name: movie_id
        description: A unique identifier for each movie, retrieved from the TMDB /movie/{id}/credits endpoint.
        data_type: number
      - name: endpoint
        description: The API endpoint from which the movie credits data was retrieved.
        data_type: varchar
      - name: raw_json
        description: A variant column containing the full raw JSON response retrieved from the TMDB Movie Credits API endpoint, including cast and crew arrays.
        data_type: variant
      - name: ingested_at
        description: A timestamp indicating when the data was ingested into the database.
        data_type: timestamp_ntz
