models:
  - name: silver_movie_details
    description: Deduplicated movie detail data from the /movie/{id} endpoint. One row per movie, keeping the latest ingestion.
    columns:
      - name: MOVIE_ID
        description: Unique identifier for the movie as provided by TMDB.
        data_type: number
        tests:
          - unique
          - not_null
      - name: IMDB_ID
        description: IMDb identifier for the movie (e.g. tt0137523).
        data_type: varchar
      - name: TITLE
        description: The movie title in the requested language.
        data_type: varchar
        tests:
          - not_null
      - name: TAGLINE
        description: The movie tagline, if available.
        data_type: varchar
      - name: STATUS
        description: Release status (e.g. Released, In Production).
        data_type: varchar
        tests:
          - not_null
      - name: RUNTIME
        description: Movie runtime in minutes.
        data_type: number
      - name: BUDGET
        description: Production budget in USD.
        data_type: number
      - name: REVENUE
        description: Box office revenue in USD.
        data_type: number
      - name: ORIGINAL_LANGUAGE
        description: The original language of the movie (ISO 639-1 code).
        data_type: varchar
        tests:
          - not_null
      - name: OVERVIEW
        description: A short plot summary of the movie.
        data_type: varchar
      - name: RELEASE_DATE
        description: The theatrical release date of the movie.
        data_type: date
      - name: POPULARITY
        description: TMDB popularity score for the movie.
        data_type: float
        tests:
          - not_null
      - name: VOTE_AVERAGE
        description: Average user rating on TMDB (0-10 scale).
        data_type: float
        tests:
          - not_null
      - name: VOTE_COUNT
        description: Total number of user votes on TMDB.
        data_type: number
        tests:
          - not_null
      - name: ADULT
        description: Whether the movie is flagged as adult content.
        data_type: boolean
        tests:
          - not_null
      - name: ENDPOINT
        description: The API endpoint from which the data was retrieved.
        data_type: varchar
        tests:
          - not_null
      - name: INGESTED_AT
        description: Timestamp of the latest ingestion for this movie.
        data_type: timestamp_ntz
        tests:
          - not_null
