models:
  - name: silver_movie_cast
    description: Cast members per movie, exploded from the /movie/{id}/credits endpoint. One row per movie-person association.
    columns:
      - name: MOVIE_ID
        description: Foreign key referencing the movie.
        data_type: number
        tests:
          - not_null
      - name: PERSON_ID
        description: TMDB identifier for the cast member.
        data_type: number
        tests:
          - not_null
      - name: NAME
        description: Full name of the cast member.
        data_type: varchar
        tests:
          - not_null
      - name: CHARACTER
        description: Character name played by this person in the movie.
        data_type: varchar
      - name: CAST_ORDER
        description: Order of appearance in the credits (lower = more prominent).
        data_type: number
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - MOVIE_ID
            - PERSON_ID
